<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mirror Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <h1>SMART MIRROR</h1>
            <div class="exercise-badge">{{ exercise_name }}</div>
        </header>

        <main class="main-content">
            <div class="video-container">
                <img src="/video_feed" alt="Live Camera Feed" id="video-stream">
                <div class="cue-overlay" id="cue-text">Connecting...</div>
            </div>

            <aside class="stats-panel">
                <div class="stat-card primary">
                    <h3>Reps</h3>
                    <div class="value highlight" id="rep-count">0</div>
                </div>

                <div class="stat-card">
                    <h3>Current State</h3>
                    <div class="value" id="state-text">NONE</div>
                </div>

                <div class="stat-card">
                    <h3 id="metric-label">Angle</h3>
                    <div class="value" id="current-metric">--</div>
                </div>

                <div class="system-stats">
                    <p>Latency: <span id="latency">--</span> ms</p>
                    <p>FPS: <span id="fps">--</span></p>
                </div>
                
                <button id="btn-end" class="btn-end">END EXERCISE</button>
            </aside>
        </main>
    </div>

    <!-- Summary Modal -->
    <div class="modal-overlay" id="summary-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>WORKOUT COMPLETE</h2>
            </div>
            
            <div class="summary-stats">
                <div class="summary-stat-card good">
                    <h4>Perfect Reps</h4>
                    <div class="val" id="sum-correct">0</div>
                </div>
                <div class="summary-stat-card bad">
                    <h4>Mistakes</h4>
                    <div class="val" id="sum-incorrect">0</div>
                </div>
                <div class="summary-stat-card acc" style="grid-column: span 2;">
                    <h4>Accuracy</h4>
                    <div class="val"><span id="sum-acc">0</span>%</div>
                </div>
            </div>

            <div class="feedback-section">
                <h4>Areas for Improvement</h4>
                <ul class="feedback-list" id="feedback-list">
                    <!-- Populated dynamically -->
                </ul>
            </div>

            <button id="btn-close-modal" class="btn-close">CLOSE APP</button>
        </div>
    </div>

    <script>
        const repCountEl = document.getElementById('rep-count');
        const stateTextEl = document.getElementById('state-text');
        const currentMetricEl = document.getElementById('current-metric');
        const metricLabelEl = document.getElementById('metric-label');
        const cueTextEl = document.getElementById('cue-text');
        const latencyEl = document.getElementById('latency');
        const fpsEl = document.getElementById('fps');
        let pollingInterval = null;

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                repCountEl.textContent = data.rep_count;
                stateTextEl.textContent = data.state_text;
                metricLabelEl.textContent = data.use_ratio_mode ? "Ratio" : "Angle (deg)";
                currentMetricEl.textContent = data.metric !== null ? data.metric : "--";
                cueTextEl.textContent = data.cue_text;
                if (data.is_correct) {
                    cueTextEl.className = "cue-overlay success";
                } else {
                    cueTextEl.className = "cue-overlay error";
                }
                latencyEl.textContent = data.latency_ms;
                fpsEl.textContent = data.fps;
            } catch (err) {
                console.error("Error fetching stats:", err);
            }
        }

        pollingInterval = setInterval(fetchStats, 33);

        // End Exercise Modal Logic
        document.getElementById('btn-end').addEventListener('click', async () => {
            clearInterval(pollingInterval); // stop polling stats
            
            try {
                const res = await fetch('/api/summary');
                const data = await res.json();
                
                document.getElementById('sum-correct').textContent = data.correct_reps;
                document.getElementById('sum-incorrect').textContent = data.incorrect_reps;
                document.getElementById('sum-acc').textContent = data.accuracy;
                
                const listEl = document.getElementById('feedback-list');
                listEl.innerHTML = '';
                
                if (Object.keys(data.mistake_counts).length === 0) {
                    listEl.innerHTML = '<li>Perfect form! Keep it up!</li>';
                } else {
                    for (const [mistake, count] of Object.entries(data.mistake_counts)) {
                        listEl.innerHTML += `<li><span>${mistake}</span> <span style="color:var(--error); font-weight:bold;">${count}x</span></li>`;
                    }
                }
                
                document.getElementById('summary-modal').classList.add('active');
            } catch (err) {
                console.error(err);
            }
        });

        document.getElementById('btn-close-modal').addEventListener('click', () => {
            window.close(); // attempts to close the tab
        });
    </script>
</body>
</html>
